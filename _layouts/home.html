layout: compress
---
<!DOCTYPE html>
<!--[if lt IE 7]><html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if (IE 7)&!(IEMobile)]><html class="no-js lt-ie9 lt-ie8"><![endif]-->
<!--[if (IE 8)&!(IEMobile)]><html class="no-js lt-ie9"><![endif]-->
<!--[if gt IE 8]><!--> <html class="no-js"><!--<![endif]-->
<head>
    {% include head.html %}
</head>
<body>
    {% include nav.html %}
    <!-- Header -->
    <header class="header flex" role="banner">
        <div class="container animated fadeIn" style="background-color:rgba(255, 255, 255, 0.95)">
            <div class="row">
                    <a href="{{ site.url }}">
                        <img src="{{ site.logo }}" class="img-circle zoombtn animated rotateIn" style="background-color:rgba(204, 204, 255, 0.95)">
                    </a>
                    <h3 class="title">
                        <a class="zoombtn" href="{{ site.url }}">
                        	<p style="font-size:1.6rem;font-weight:500">{{ site.title }}</p>
			            </a>
                    </h3>
                    <hr class="hr-line">
                    <h3 class="title">
                        <a href="{{ site.url }}">
                        	<p style="font-size:1.2rem;font-weight:400">{{ site.bio }}</p>
			            </a>
                    </h3>
                    {% include social-links.html %}
                  <hr class="hr-line">
                  <h3 class="title">
                         <a class="btn zoombtn" href="{{ site.url }}/about" style="background-color:rgba(255, 255, 255, 0.9)">
                             <p style="font-size:1rem;font-weight:450">About Me</p>
                         </a>
                         <a class="btn zoombtn" href="{{ site.url }}/projects" style="background-color:rgba(255, 255, 255, 0.9)">
                             <p style="font-size:1rem;font-weight:450">Projects</p>
                         </a>
                         <a class="btn zoombtn" href="{{ site.url }}/publications" style="background-color:rgba(255, 255, 255, 0.9)">
                             <p style="font-size:1rem;font-weight:450">Publications</p>
                         </a>
                         <a class="btn zoombtn" href="{{ site.url }}/posts" style="background-color:rgba(255, 255, 255, 0.9)">
                             <p style="font-size:1rem;font-weight:450">Posts</p>
                         </a>
                 </h3>
            </div>
        </div>
    </header>
    {% include scripts.html %}
</body>
</html>
