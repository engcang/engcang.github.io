---
layout: compress
---
<!DOCTYPE html>
<!--[if lt IE 7]><html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if (IE 7)&!(IEMobile)]><html class="no-js lt-ie9 lt-ie8"><![endif]-->
<!--[if (IE 8)&!(IEMobile)]><html class="no-js lt-ie9"><![endif]-->
<!--[if gt IE 8]><!--> <html class="no-js"><!--<![endif]-->
<head>
    {% include head.html %}
</head>
<body>
    {% include nav.html %}
    <!-- Header -->
    <header class="header" role="banner">
        <div class="wrapper animated fadeIn" style="background-color:rgba(255, 255, 255, 0.85)">
            <div class="content" style="background-color:rgba(255, 255, 255, 0)">
                <div class="post-title">
                    <h1>{{ page.title }}</h1>
                    <a class="btn zoombtn" href="{{site.url}}">
                        <i class="fa fa-home"></i>
                    </a>
                </div>
                <div class="post-list" style="background-color:rgba(255, 255, 255, 0)">
                    {% for post in site.posts %} 
                        {% if post.post %}
                    <ul>
                        <li>
                            <p style="font-size:1rem;font-weight:450">
                                <span style="color:#9933ff">{{ post.date }}</span><a href="{{ site.url }}{{ post.url }}">{{ post.title }} <span style="color:#3399ff">[Read]</span></a>
                            </p>
                        </li>
                    </ul>
                        {% endif %}
                    {% endfor %}
                </div>
            </div>
            <hr class="hr-line">
            {% include social-links.html %}
        </div>
    </header>
    {% include scripts.html %}
    <script src="{{ site.url }}/assets/js/wow.min.js"></script>
    <script type="text/javascript">(new WOW).init();</script>
</body>
</html>
